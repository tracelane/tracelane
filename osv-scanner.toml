# osv-scanner.toml — ignore list for OSV-Scanner (security-scan.yml).
#
# OSV-Scanner fails on ANY advisory across BOTH ecosystems with no severity
# gate and does not read .cargo/audit.toml, so it re-surfaces advisories that
# cargo-audit / pnpm-audit already justify. Each ignore below is the SAME
# posture as those tools. The one genuinely actionable finding OSV raised —
# jsonwebtoken GHSA-h395-gr6q-cpjc — was FIXED by bumping to 10.4.0,
# not ignored. npm moderates are below the pnpm-audit --audit-level=high gate
# and tracked internally.

# bincode: bincode 1.x unmaintained, transitive; 2.0 is a transitive-incompatible major bump. Mirrors .cargo/audit.toml.
