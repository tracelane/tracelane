# cargo-deny configuration (schema version 2)
# Refs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Kept in sync with .cargo/audit.toml (cargo-deny and cargo-audit read the same
# advisory DB but separate configs). See (wasmtime) + .
ignore = [
 # rustls-webpki — transitive via async-nats 0.42; CRL path unreachable
 # (operator-controlled NATS URL). Fix = async-nats >=0.47.
 "RUSTSEC-2026-0049",
 "RUSTSEC-2026-0098",
 "RUSTSEC-2026-0099",
 "RUSTSEC-2026-0104",
 # rustls-pemfile — informational/deprecated.
 "RUSTSEC-2025-0134",
 # paste / bincode — unmaintained transitive crates (no fix path).
 "RUSTSEC-2024-0436",
 "RUSTSEC-2025-0141",
 # wasmtime 20.0.x — only reachable via the off-by-default wasm-plugin
 # feature (not in any V1 binary). Upgrade tracked internally.
 "RUSTSEC-2024-0438",
 "RUSTSEC-2024-0439",
 "RUSTSEC-2025-0046",
 "RUSTSEC-2025-0118",
 "RUSTSEC-2026-0020",
 "RUSTSEC-2026-0021",
 "RUSTSEC-2026-0085",
 "RUSTSEC-2026-0086",
 "RUSTSEC-2026-0087",
 "RUSTSEC-2026-0088",
 "RUSTSEC-2026-0089",
 "RUSTSEC-2026-0091",
 "RUSTSEC-2026-0092",
 "RUSTSEC-2026-0093",
 "RUSTSEC-2026-0094",
 "RUSTSEC-2026-0095",
 "RUSTSEC-2026-0096",
]

[licenses]
version = 2
allow = [
 "Apache-2.0",
 "Apache-2.0 WITH LLVM-exception",
 "MIT",
 "BSD-2-Clause",
 "BSD-3-Clause",
 "ISC",
 "MPL-2.0",
 "Unicode-DFS-2016",
 "Unicode-3.0",
 "CC0-1.0",
 "Zlib",
 # Community Data License Agreement – Permissive 2.0: a permissive data
 # license used by transitive ML/data crates (e.g. ONNX-adjacent). No
 # copyleft/source obligations on our code.
 "CDLA-Permissive-2.0",
 # ──────────────────────────────────────────────────────────────────────
 # PENDING FOUNDER LICENSE REVIEW (do not self-approve — CC-HONESTY lane C).
 # 0BSD and Unlicense are public-domain-equivalent (zero obligations,
 # weaker than MIT). Today they appear ONLY as the *alternative* branch of
 # dual-licensed transitive crates we already accept via MIT/Apache-2.0:
 # adler2@2.0.1 "0BSD OR MIT OR Apache-2.0"
 # aho-corasick@1.x "Unlicense OR MIT" (pulled by `regex`)
 # byteorder@1.x "Unlicense OR MIT"
 # memchr@2.x "Unlicense OR MIT" (pulled by `regex`/`aho-corasick`)
 # They PASS today (cargo-deny picks the MIT/Apache branch). Adding these is
 # defense-in-depth so a future *single*-licensed (0BSD/Unlicense-only)
 # transitive revision can't dark-fail the nightly Security Scan.
 # Founder ACCEPTED 2026-06-20 (permissive, public-domain-equivalent):
 "0BSD",
 "Unlicense",
]
confidence-threshold = 0.93
# GPL/AGPL/ELv2/BUSL/SSPL denied by omission in schema v2

[bans]
multiple-versions = "warn"
# Internal workspace crates are referenced by path (which cargo-deny sees as
# "*"); allow-wildcard-paths doesn't apply to publishable crates, so this is
# `warn` rather than `deny`. The real risk it guards (a crates.io "*" version
# pin) would still surface as a warning. No external dep uses a "*" pin.
wildcards = "warn"
deny = [
 # NOTE: `openssl` / `openssl-sys` appear only as a transitive BUILD
 # dependency of ort-sys's ONNX-runtime downloader (ureq -> native-tls);
 # they are absent from the product runtime tree. The authoritative runtime
 # openssl ban is the dedicated `no-openssl-check` job (cargo tree on the
 # default/runtime graph). cargo-deny scans build-deps too, so banning
 # openssl here produces a false positive on a build-only crate. See .
 { name = "litellm" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
