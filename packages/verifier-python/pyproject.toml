[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tracelane-audit-verifier"
version = "0.2.0"
description = "Reference verifier for Tracelane tamper-evident audit ledgers"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Tracelane Contributors" }]
dependencies = [
 "cryptography>=42",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[tool.hatch.build.targets.wheel]
packages = ["src/tracelane_audit_verifier"]

[tool.ruff]
line-length = 100
target-version = "py310"
