<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="316" viewBox="0 0 880 316" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#16A34A"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#DC2626"/>
    </marker>
    <marker id="aa" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#D97706"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="316" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="440" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#111827" font-family="'Inter',system-ui,sans-serif">Prompt Promotion Workflow</text>

  <!-- Step labels -->
  <text x="84"  y="52" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">① Author</text>
  <text x="246" y="52" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">② Staging</text>
  <text x="416" y="52" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">③ Eval Gate</text>
  <text x="594" y="52" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">④ Production</text>
  <text x="778" y="52" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">⑤ Monitor</text>

  <!-- ① Author -->
  <rect x="24" y="60" width="120" height="66" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="84" y="88"  text-anchor="middle" font-size="11.5" font-weight="600" fill="#3730A3" font-family="'Inter',system-ui,sans-serif">Author</text>
  <text x="84" y="104" text-anchor="middle" font-size="10"   fill="#6366F1" font-family="'Inter',system-ui,sans-serif">new version</text>
  <text x="84" y="119" text-anchor="middle" font-size="9"    fill="#A5B4FC" font-family="'Inter',system-ui,sans-serif">SHA-256 hashed</text>

  <!-- Arrow: Author → Staging -->
  <line x1="144" y1="93" x2="182" y2="93" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="153" y="86" font-size="9" fill="#6B7280" font-family="'Inter',system-ui,sans-serif">push</text>

  <!-- ② Staging -->
  <rect x="186" y="60" width="120" height="66" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="246" y="88"  text-anchor="middle" font-size="11.5" font-weight="600" fill="#3730A3" font-family="'Inter',system-ui,sans-serif">Staging</text>
  <text x="246" y="104" text-anchor="middle" font-size="10"   fill="#6366F1" font-family="'Inter',system-ui,sans-serif">deployed, tested</text>
  <text x="246" y="119" text-anchor="middle" font-size="9"    fill="#A5B4FC" font-family="'Inter',system-ui,sans-serif">canary split optional</text>

  <!-- Arrow: Staging → Eval Gate -->
  <line x1="306" y1="93" x2="344" y2="93" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="310" y="86" font-size="9" fill="#6B7280" font-family="'Inter',system-ui,sans-serif">promote</text>

  <!-- ③ Eval Gate -->
  <rect x="348" y="54" width="136" height="78" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="2"/>
  <text x="416" y="80"  text-anchor="middle" font-size="11.5" font-weight="600" fill="#92400E" font-family="'Inter',system-ui,sans-serif">Eval Gate</text>
  <text x="416" y="97"  text-anchor="middle" font-size="10"   fill="#B45309" font-family="'Inter',system-ui,sans-serif">all assertions green?</text>
  <text x="416" y="114" text-anchor="middle" font-size="9.5"  fill="#D97706" font-family="'Inter',system-ui,sans-serif">100 % pass threshold</text>
  <text x="416" y="126" text-anchor="middle" font-size="9"    fill="#FCD34D" font-family="'Inter',system-ui,sans-serif">streams results in UI</text>

  <!-- Arrow: Eval Gate ─pass─► Production (green, horizontal) -->
  <line x1="484" y1="93" x2="524" y2="93" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>
  <text x="490" y="86" font-size="9" font-weight="600" fill="#16A34A" font-family="'Inter',system-ui,sans-serif">pass</text>

  <!-- Arrow: Eval Gate ─fail─► Blocked (red, down) -->
  <line x1="416" y1="132" x2="416" y2="196" stroke="#DC2626" stroke-width="2" marker-end="url(#ar)"/>
  <text x="423" y="167" font-size="9" font-weight="600" fill="#DC2626" font-family="'Inter',system-ui,sans-serif">fail</text>

  <!-- ④ Production -->
  <rect x="528" y="60" width="132" height="66" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="594" y="88"  text-anchor="middle" font-size="11.5" font-weight="600" fill="#166534" font-family="'Inter',system-ui,sans-serif">Production</text>
  <text x="594" y="104" text-anchor="middle" font-size="10"   fill="#16A34A" font-family="'Inter',system-ui,sans-serif">atomic version swap</text>
  <text x="594" y="119" text-anchor="middle" font-size="9"    fill="#4ADE80" font-family="'Inter',system-ui,sans-serif">&lt;1 ms p95 resolve</text>

  <!-- Arrow: Production → Monitor -->
  <line x1="660" y1="93" x2="700" y2="93" stroke="#6B7280" stroke-width="1.5" marker-end="url(#ab)"/>
  <text x="667" y="86" font-size="9" fill="#6B7280" font-family="'Inter',system-ui,sans-serif">live</text>

  <!-- ⑤ Monitor -->
  <rect x="704" y="60" width="148" height="66" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
  <text x="778" y="84"  text-anchor="middle" font-size="11.5" font-weight="600" fill="#3730A3" font-family="'Inter',system-ui,sans-serif">Monitor</text>
  <text x="778" y="100" text-anchor="middle" font-size="10"   fill="#6366F1" font-family="'Inter',system-ui,sans-serif">eval score · error rate</text>
  <text x="778" y="116" text-anchor="middle" font-size="9"    fill="#A5B4FC" font-family="'Inter',system-ui,sans-serif">latency · token spend</text>

  <!-- Arrow: Monitor ─drift─► Auto-rollback (amber, down) -->
  <line x1="778" y1="126" x2="778" y2="196" stroke="#D97706" stroke-width="2" marker-end="url(#aa)"/>
  <text x="784" y="163" font-size="9" font-weight="600" fill="#D97706" font-family="'Inter',system-ui,sans-serif">&gt;2σ drift</text>

  <!-- Blocked box -->
  <rect x="348" y="200" width="136" height="68" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="416" y="226" text-anchor="middle" font-size="11.5" font-weight="600" fill="#991B1B" font-family="'Inter',system-ui,sans-serif">Blocked</text>
  <text x="416" y="243" text-anchor="middle" font-size="10"   fill="#DC2626" font-family="'Inter',system-ui,sans-serif">failed assertions shown</text>
  <text x="416" y="259" text-anchor="middle" font-size="9"    fill="#FCA5A5" font-family="'Inter',system-ui,sans-serif">fix prompt · retry</text>

  <!-- Auto-rollback box -->
  <rect x="704" y="200" width="148" height="68" rx="8" fill="#FFFBEB" stroke="#FDE68A" stroke-width="1.5"/>
  <text x="778" y="225" text-anchor="middle" font-size="11.5" font-weight="600" fill="#92400E" font-family="'Inter',system-ui,sans-serif">Auto-rollback</text>
  <text x="778" y="242" text-anchor="middle" font-size="10"   fill="#B45309" font-family="'Inter',system-ui,sans-serif">previous version restored</text>
  <text x="778" y="258" text-anchor="middle" font-size="9"    fill="#FCD34D" font-family="'Inter',system-ui,sans-serif">audit ledger entry written</text>

  <!-- Bottom caption -->
  <text x="440" y="294" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">Full promotion workflow on Team $249+ · Read-only history on Builder $59</text>

</svg>
