  <text x="342" y="405" text-anchor="middle" font-size="10" fill="#6B7280" font-family="'Inter',system-ui,sans-serif">cold tier · 1 MB batches</text>
  <text x="342" y="421" text-anchor="middle" font-size="9.5" fill="#9CA3AF" font-family="'Inter',system-ui,sans-serif">queryable via tlane export</text>

  <rect x="456" y="362" width="204" height="68" rx="8" fill="#F8FAFC" stroke="#D1D5DB" stroke-width="1.5"/>
