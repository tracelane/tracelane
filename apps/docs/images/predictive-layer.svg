  <!-- Any block → Rejected -->
  <rect x="584" y="384" width="272" height="52" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.5"/>
  <text x="720" y="409" text-anchor="middle" font-size="12" font-weight="600" fill="#991B1B" font-family="'Inter',system-ui,sans-serif">Any guard blocks → Rejected</text>
  <text x="720" y="427" text-anchor="middle" font-size="10" fill="#DC2626" font-family="'Inter',system-ui,sans-serif">verdict + rule ID returned to caller</text>

  <!-- Line from block guards to rejection box -->
  <line x1="755" y1="354" x2="720" y2="382" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ar)"/>

</svg>
