  <text x="694"  y="345" text-anchor="middle" font-size="9" font-weight="600" fill="#A16207" font-family="'Inter',system-ui,sans-serif">default: warn</text>

  <!-- ── OUTCOME ROW ─────────────────────────────────────────── -->
  <!-- All pass → Provider -->
  <line x1="440" y1="354" x2="440" y2="380" stroke="#16A34A" stroke-width="2" marker-end="url(#ag)"/>

  <rect x="24"  y="384" width="544" height="52" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="296" y="409" text-anchor="middle" font-size="12" font-weight="600" fill="#166534" font-family="'Inter',system-ui,sans-serif">All guards pass → Provider Router → LLM</text>
