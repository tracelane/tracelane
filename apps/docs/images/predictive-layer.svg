  <rect x="24"  y="134" width="194" height="8"   fill="#FEE2E2"/>
  <text x="121" y="133" text-anchor="middle" font-size="10.5" font-weight="700" fill="#991B1B" font-family="'Inter',system-ui,sans-serif">PR1 — MCP Rug-pull</text>
