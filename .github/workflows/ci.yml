  tenants-pk-guard:
    name: tenants PK is `id` not `tenant_id` (old-shape SQL guard)
    runs-on: "${{ vars.CI_RUNNER || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Block SQL that treats the tenants PK as tenant_id (bitten 4x — derived-id vs PK seam)
        run: ./scripts/ci/check-tenants-pk-column.sh

  no-llm-in-recovery:
