    runs-on: "${{ vars.CI_RUNNER || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Block LLM/MCP/provider imports in recovery paths
