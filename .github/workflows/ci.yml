      - name: Block ClickHouse SQL reading bare llm.* GenAI attrs without the gen_ai_* primary
        run: ./scripts/ci/check-genai-attr-keys.sh

  no-e2e-auth-in-prod:
    name: E2E auth-bypass flag confinement guard
    runs-on: "${{ vars.CI_RUNNER || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Block the E2E auth-bypass flag anywhere a prod build can see it
        run: ./scripts/ci/no-e2e-auth-in-prod.sh

  # Fast per-push secret + supply-chain gate. Secret detection is the one scan
  # where push-time matters (especially ahead of the public extraction, ).
  # The slow Rust vuln scans (cargo-audit, cargo-deny, grype, osv) stay nightly
  # in security-scan.yml. Always-on; ~1 min.
  secret-scan:
    name: Secret + supply-chain scan (fast)
    runs-on: "${{ vars.CI_RUNNER || 'ubuntu-latest' }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # gitleaks runs FIRST, on the pristine checkout (no node_modules/target
      # present yet), so it stays ~3s and false-positive-free.
      - name: Install gitleaks
        # Extract to $RUNNER_TEMP (always runner-writable) — NOT /usr/local/bin,
        # which the self-hosted runner user can't write (it only worked on the
        # ephemeral ubuntu-latest VM where the runner had sudo).
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
      - name: Gitleaks secret scan
        run: |
          "$RUNNER_TEMP/gitleaks" dir . --no-banner --config .gitleaks.toml
      - name: .pth file scan (ML supply chain)
        run: |
          if find . -name "*.pth" -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
            echo "ERROR: .pth files found — potential ML model backdoor"
            find . -name "*.pth" -not -path "./node_modules/*" -not -path "./.git/*"
            exit 1
          fi
          echo ".pth scan: clean"
      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: 9
      - name: Setup Node
        # No pnpm cache here: `pnpm audit` reads pnpm-lock.yaml (no install,
        # no node_modules), so the cache adds nothing — and dropping it removes
        # the cache-save post-step that can fail the job during a GitHub
        # cache-service outage.
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4.0.2
        with:
          node-version: 22
      - name: pnpm audit (high severity)
        run: pnpm audit --audit-level=high

  bench:
    name: Benchmarks (gateway + ingest hot path)
    needs: changes
    # Auto-run whenever the perf-sensitive surface (gateway/ingest/shared/policy)
    # changed — no manual 'hot-path' label needed (the label gate meant bench
    # almost never ran). On nightly/dispatch the `changes` job fail-safes to
    # all-true, so the perf budgets are enforced every night regardless of paths.
    # The dedicated self-hosted box also yields STABLE criterion numbers (vs the
    # noisy shared GitHub runners), which is what makes `bench:budgets` meaningful.
    #
    # gate is needed — a PR-to-main touching the hot path (`live_stack`, which the
    # `changes` filter sets for crates/gateway|ingest|shared|policy) + the WEEKLY
    # cron + manual dispatch — but NOT on the post-merge main `push` (redundant
    # with the PR run that already gated the merge). `!= push` keeps it off the
    # main-push event while `live_stack` keeps it on hot-path PRs.
    # NOTE: a DIRECT-to-main hot-path push (no PR) therefore skips bench until the
    # weekly cron — route hot-path changes through a PR to get the bench gate.
    if: needs.changes.outputs.live_stack == 'true' && github.event_name != 'push'
    runs-on: ubuntu-latest  # HEAVY (cargo/stack): OFF the prod node (per-job routing; ubuntu-latest is billing-gated - the founder's separate concern)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable 2024-12
      - name: Cache Rust deps
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84  # v2.7.3
        with:
          # Bench compiles in the RELEASE profile — a distinct target dir from the
          # debug jobs, so it gets its own shared cache (mixing profiles under one
          # key thrashes the hit rate). 2 caches total (rust-ci + rust-bench),
          # both under the 10 GB cap.
          shared-key: "rust-bench"
      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: 9
      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4.0.2
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Run hot-path benchmarks (gateway + ingest criterion)
        run: |
          pnpm bench:gateway
          pnpm bench:ingest
      - name: Enforce performance budgets (punchlist #5)
        run: pnpm bench:budgets
