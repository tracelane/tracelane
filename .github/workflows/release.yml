name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write      # Required for Trusted Publishing OIDC, Sigstore keyless, and SLSA provenance
  attestations: write  # Required for actions/attest-build-provenance (SLSA L3)

jobs:
  verify-approvals:
    name: Verify 2 maintainer approvals on release tag
    runs-on: ubuntu-latest
    # A26: real gate — `production-release` is a GitHub Environment
    # configured at repo level to require 2 reviewers before this job
    # can start. The workflow waits at this job until a maintainer
    # approves via the GitHub UI; downstream jobs `needs: verify-approvals`
    # so the entire publish chain stalls until then. Founder action:
    # configure the `production-release` environment in repo Settings →
    # Environments with `required_reviewers: 2`.
    environment:
      name: production-release
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
    steps:
      - name: Record approval gate passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "::notice title=Release approved::Tag $TAG cleared the production-release environment gate (2 maintainer approvals required)."

  build-rust:
    name: Build Rust binaries
    needs: verify-approvals
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable 2024-12
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84  # v2.7.3

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build gateway release binary
        run: cargo build --release --package gateway --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3  # v4.3.1
        with:
          name: gateway-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/gateway

  sign-and-release:
    name: Sign artifacts and publish release
    needs: build-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          path: artifacts/

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20  # v3.5.0

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5  # v0.17.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Sign binaries with Sigstore Cosign (keyless OIDC)
        run: |
          for binary in artifacts/gateway-*/gateway; do
            cosign sign-blob \
              --yes \
              --oidc-issuer=https://token.actions.githubusercontent.com \
              --bundle="${binary}.cosign.bundle" \
              "${binary}"
          done

      - name: Sign SBOM
        run: |
          cosign sign-blob \
            --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --bundle=sbom.cyclonedx.json.cosign.bundle \
            sbom.cyclonedx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@1c214ab373197cfdedb8c44482a8faf4608192d7  # v2.2.0
        with:
          files: |
            artifacts/**/*
            sbom.cyclonedx.json
            sbom.cyclonedx.json.cosign.bundle
          generate_release_notes: true
          body: |
            ## Verification

            All binaries are signed with [Sigstore Cosign](https://sigstore.dev) keyless OIDC.

            Verify a binary:
            ```bash
            cosign verify-blob \
              --bundle <binary>.cosign.bundle \
              --certificate-identity-regexp="https://github.com/tracelane/tracelane/.*" \
              --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
              <binary>
            ```

            SBOM (CycloneDX JSON) is attached as `sbom.cyclonedx.json`.

  slsa-provenance:
    name: Generate SLSA Build Level 3 provenance
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download all binary artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          path: artifacts/

      - name: Generate SHA-256 hashes for all binaries
        id: hash
        run: |
          cd artifacts
          # Generate hashes for all downloaded binaries
          find . -type f -name "gateway" | while read f; do
            sha256sum "$f"
          done > ../binary-hashes.txt
          cat ../binary-hashes.txt
          HASH_B64=$(base64 -w0 ../binary-hashes.txt)
          echo "hashes=${HASH_B64}" >> "$GITHUB_OUTPUT"

      - name: Attest binary provenance (GitHub Attestations / SLSA L3)
        uses: actions/attest-build-provenance@1c608d11d69870c2092266b3f9a6f3abbf17002c  # v1.4.3
        with:
          subject-path: |
            artifacts/gateway-x86_64-unknown-linux-gnu/gateway
            artifacts/gateway-aarch64-unknown-linux-gnu/gateway
            artifacts/gateway-x86_64-apple-darwin/gateway
            artifacts/gateway-aarch64-apple-darwin/gateway

      - name: Upload hash manifest
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3  # v4.3.1
        with:
          name: binary-hashes
          path: binary-hashes.txt

  slsa-framework-generator:
    name: SLSA L3 provenance (slsa-github-generator)
    needs: [build-rust, slsa-provenance]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563  # v2.0.0
    with:
      base64-subjects: "${{ needs.slsa-provenance.outputs.hashes }}"
      upload-assets: true

  publish-crate:
    name: Publish to crates.io (Trusted Publishing)
    needs: sign-and-release
    runs-on: ubuntu-latest
    environment: crates-io  # OIDC Trusted Publishing — configure repo at crates.io/settings/tokens
    permissions:
      id-token: write  # Required for crates.io OIDC Trusted Publishing (cargo 1.77+)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable 2024-12

      - name: Publish tracelane-shared
        # crates.io Trusted Publishing: short-lived OIDC token issued automatically
        # when id-token: write is granted and the repo is registered as a trusted
        # publisher at crates.io/settings/tokens (cargo 1.77+). No static secret needed.
        run: cargo publish --package tracelane-shared

  publish-npm:
    name: Publish to npm (Trusted Publishing / OIDC)
    needs: sign-and-release
    runs-on: ubuntu-latest
    environment: npm  # Requires OIDC Trusted Publishing configured on npmjs.com
    permissions:
      id-token: write  # Required for npm OIDC Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d  # v3.0.0
        with:
          version: 9

      - name: Setup Node
        # node 24+ ships an npm CLI with OIDC Trusted Publishing support;
        # `--provenance` requires id-token: write and no NODE_AUTH_TOKEN.
        # See npmjs.com/docs/cli/v10/configuring-npm/trusted-publishing.
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8  # v4.0.2
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build the published packages
        # The published packages ship `files: ["dist"]`; build them explicitly
        # (root `pnpm build` only builds the dashboard). pnpm builds in
        # dependency order, so the verifier is built before the CLI that uses it.
        run: pnpm --filter @tracelanedev/audit-verifier --filter @tracelanedev/sdk --filter @tracelanedev/cli build

      - name: Publish @tracelanedev/* (OIDC, no long-lived token)
        # ADR-008: Trusted Publishing OIDC for crates.io, npm, PyPI, Docker Hub.
        # No long-lived tokens. NODE_AUTH_TOKEN removed — npm CLI accepts the
        # short-lived OIDC token issued via id-token: write when the package
        # is configured for Trusted Publishing on npmjs.com.
        # Founder action B8 — register the public repo as a Trusted Publisher
        # for every @tracelanedev/* package before the first release runs.
        #
        # Publish ORDER matters: @tracelanedev/cli depends on
        # @tracelanedev/audit-verifier via `workspace:*`. `pnpm publish` rewrites
        # `workspace:*` to the concrete version in the published tarball, so the
        # verifier MUST be on npm first for the CLI's dependency to resolve.
        run: |
          pnpm --filter @tracelanedev/audit-verifier publish --access public --no-git-checks --provenance
          pnpm --filter @tracelanedev/sdk publish --access public --no-git-checks --provenance
          pnpm --filter @tracelanedev/cli publish --access public --no-git-checks --provenance

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing / OIDC)
    needs: sign-and-release
    runs-on: ubuntu-latest
    environment: pypi  # Requires OIDC Trusted Publishing configured on pypi.org
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build Python SDK
        run: python -m build packages/sdk-python/

      - name: Publish to PyPI via OIDC (no long-lived token)
        uses: pypa/gh-action-pypi-publish@ec4db0b4ddc65acdf4bff5fa45ac92d78b56bdf0  # release/v1
        with:
          packages-dir: packages/sdk-python/dist/
