name: Release container (GHCR)

# Builds the gateway container from the Chainguard/Wolfi Dockerfile, pushes it
# to GitHub Container Registry by digest, and attaches the full supply-chain
# chain: Sigstore Cosign keyless signature, CycloneDX SBOM, and SLSA Build
# Level 3 provenance. No long-lived registry tokens — GHCR push uses the
# short-lived GITHUB_TOKEN and signing uses keyless OIDC (ADR-008).
#
# Founder dry-run before the public flip: push a `vX.Y.Z-rc` tag (or run with
# `push: false` locally on a Docker host) and confirm `cosign verify` resolves
# the signature + the SLSA attestation against the pushed digest. The repo's
# WSL/CI dev box has no Docker, so this path is validated on a Docker host only.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}/gateway

jobs:
  build-push-sign:
    name: Build · push · sign · SBOM · provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # Cosign keyless + SLSA provenance (OIDC)
      attestations: write # actions/attest-build-provenance
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # short-lived job token, not a stored secret

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # build-push-action's own SLSA provenance + SBOM attestations, in
          # addition to the explicit Cosign + CycloneDX + attest steps below.
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign the image (Cosign keyless OIDC)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate CycloneDX SBOM for the image
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5 # v0.17.0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: gateway-sbom.cdx.json

      - name: Attach SBOM attestation (Cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type cyclonedx --predicate gateway-sbom.cdx.json "${IMAGE}@${DIGEST}"

      - name: SLSA Build Level 3 provenance (image digest)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
