name: SBOM

on:
  schedule:
    - cron: "0 4 * * 1"  # Weekly Monday 04:00 UTC
  workflow_dispatch:

# Moved off per-push (2026-06-06 CI cost pass): SBOM is a slow scan and was
# duplicated by a now-removed ci.yml `sbom` job. Runs weekly + on demand.
concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  generate-sbom:
    name: Generate and sign CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20  # v3.5.0

      - name: Generate full-repo SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5  # v0.17.0
        with:
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@d94f46e13c6c62f59525ac9a1e147a99dc0b9bf5  # v0.17.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Sign SBOM with Sigstore Cosign (keyless OIDC)
        run: |
          cosign sign-blob \
            --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --bundle=sbom.cyclonedx.json.cosign.bundle \
            sbom.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cyclonedx.json
            sbom.cyclonedx.json.cosign.bundle
            sbom.spdx.json
          retention-days: 365
