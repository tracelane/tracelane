name: E2E Smoke

# End-to-end integration smoke (punchlist #4): proves a real OTLP span shipped
# to the ingest receiver lands in ClickHouse, tenant-scoped. Slow (boots live
# infra + builds ingest), so it is opt-in: it runs on manual dispatch and on
# PRs labelled `smoke` (mirrors the `bench` job's `hot-path` gate). Promote it
# to a required check once it has a green history.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    name: Integration smoke (ingest -> ClickHouse)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'smoke')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable 2024-12

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Setup Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c  # v5.0.0
        with:
          python-version: "3.12"

      - name: Install OTLP exporter (for the span sender)
        run: pip install opentelemetry-sdk opentelemetry-exporter-otlp-proto-http

      - name: Run the e2e smoke
        run: bash scripts/smoke/e2e-smoke.sh
